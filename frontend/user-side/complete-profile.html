<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Complete Profile - Scentora</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Aclonica&family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-dark: #2f425f;
            --form-bg: #e9eef5;
            --text-blue: #1f3b6f;
        }

        body {
            background-color: #f4f7f6;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Outfit', sans-serif;
            margin: 0;
        }

        .login-container {
            width: 100%;
            max-width: 1000px;
            min-height: 550px;
            background: var(--primary-dark);
            border-radius: 12px;
            display: flex;
            gap: 50px;
            padding: 50px;
            color: #fff;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
        }

        .left-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .brand {
            font-family: 'Aclonica', sans-serif;
            font-size: 2.5rem;
            letter-spacing: 2px;
            margin-bottom: 10px;
        }

        .tagline {
            font-size: 1.1rem;
            opacity: 0.9;
            margin-bottom: 30px;
        }

        .right {
            flex: 1;
            background: var(--form-bg);
            border-radius: 8px;
            padding: 40px;
            color: var(--text-blue);
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        h2 { font-weight: 600; margin-bottom: 20px; }

        label {
            font-weight: 600;
            margin-bottom: 5px;
            font-size: 0.9rem;
        }

        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 20px;
            border: 1px solid #cbd5e0;
            border-radius: 6px;
            outline: none;
        }

        .finish-btn {
            background: var(--primary-dark);
            color: #fff;
            border: none;
            padding: 14px;
            border-radius: 6px;
            font-weight: 600;
            transition: 0.3s;
        }

        .finish-btn:hover {
            opacity: 0.9;
            transform: translateY(-2px);
        }

        @media (max-width: 768px) {
            .login-container { flex-direction: column; padding: 20px; margin: 10px; }
            .left-content { display: none; }
        }
    </style>
</head>
<body>

    <div class="login-container">
        <div class="left-content">
            <div class="brand">SCENTORA</div>
            <div class="tagline">Welcome to the family! <br> Help us know you better.</div>
            <div style="font-size: 4rem;">✨</div>
        </div>
<div id="profileMessage" class="alert d-none"></div>
        <div class="right">
            <h2>Almost There!</h2>
            <p class="text-muted mb-4">Complete your details to access your account.</p>
            
            <form id="completeProfileForm">
                <label>Full Name</label>
                <input type="text" id="fullName" placeholder="Enter your full name" required>

                <label>Phone Number</label>
                <input type="tel" id="phone" placeholder="+1 234 567 890" required>

                <label>Password</label>
<input type="password" id="password" placeholder="Enter password" required>

<label>Confirm Password</label>
<input type="password" id="confirmPassword" placeholder="Confirm password" required>

                <button type="submit" class="finish-btn w-100">Finish & Go Home</button>
            </form>
        </div>
    </div>

    <script>
document.addEventListener("DOMContentLoaded", () => {

    const params = new URLSearchParams(window.location.search);
    const token = params.get("token");

    if (!token) {
        window.location.href = "login.html";
        return;
    }

    const form = document.getElementById("completeProfileForm");

    form.addEventListener("submit", async (e) => {
        e.preventDefault();

        const fullName = document.getElementById("fullName").value;
        const phone = document.getElementById("phone").value;
        const password = document.getElementById("password").value;
        const confirmPassword = document.getElementById("confirmPassword").value;

        if (password !== confirmPassword) {
            alert("Passwords do not match");
            return;
        }

        const userData = {
            fullName,
            phone,
            password
        };

        try {
            const response = await fetch("http://localhost:5000/api/auth/profile", {
    method: "PUT",
    headers: {
        "Content-Type": "application/json",
        "Authorization": `Bearer ${token}`
    },
    body: JSON.stringify({
        fullName: document.getElementById("fullName").value,
        phone: document.getElementById("phone").value,
        password: document.getElementById("password").value
    })
});

            const data = await response.json();

            if (response.ok) {
                localStorage.setItem("token", token);
                window.location.href = "./home.html";
            } else {
                alert(data.message || "Failed to update profile.");
            }

        } catch (error) {
            console.error(error);
            alert("Server error.");
        }
    });
});
</script>
</body>
</html>
