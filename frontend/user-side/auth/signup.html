<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SignUp Page - Scentora</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Aclonica&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="../assets/css/style.css">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
</head>
<style>
    .pincode-field {
  grid-column: span 2;
  display: flex;
  flex-direction: column;
  align-items: center;
}
</style>
<body>
    <div class="signup-container">
        <!-- Close Button -->
        <div class="close-btn" style="color: #2f425f">&times;</div>

        <!-- Page Title -->
        <h2 class="page-title" style="color: #fff;">SignUp Page</h2>
        <div id="signupMessage" class="alert d-none" role="alert"></div>
        <!-- Form Section -->
        <form id="signup-form">
            <div class="row">
                <!-- Left Column -->
                <div class="col-md-6">
                    <div class="mb-3">
                        <label style="color: #fff;">Full Name</label>
                        <input type="text" id="name" class="form-control custom-input" name="fullName" placeholder=""
                            required>
                            <small class="text-warning error-message" id="nameError"></small>
                    </div>
                    <div class="mb-3">
    <label style="color: #fff;">Phone Number</label>
    <input type="text" id="phone" class="form-control custom-input" name="phone" required>
    <small class="text-warning error-message" id="phoneError"></small>
</div>
                    
                </div>
                <!-- Right Column -->
                <div class="col-md-6">

                    <div class="mb-3">
    <label style="color: #fff;">Email ID</label>
    <input type="email" id="email" class="form-control custom-input" name="email" required>
    <small class="text-warning error-message " id="emailError"></small>
</div>
                    <div class="mb-3">
<label style="color:#fff;">Password</label>
<input type="password" id="password" class="form-control custom-input" name="password">
<small class="text-warning error-message" id="passwordError"></small>
</div>
                </div>
                <div class="row justify-content-center">
    <div class="col-md-6 text-center">
        <div class="mb-3">
            <label style="color:#fff;">Pincode</label>
            <input type="text" class="form-control custom-input" name="pincode">
        </div>
    </div>
</div>
            </div>
            <!-- Save Button -->
            <div class="d-flex justify-content-end mt-3 gap-3">
                <button class="cancel-btn">Cancel</button>
                <button type="submit" class="btn save-btn">Save</button>

            </div>
        </form>
    </div>

    <!-- Bootstrap 5 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const signupMessage = document.getElementById("signupMessage");

function showMessage(msg, type = "danger") {
    signupMessage.textContent = msg;
    signupMessage.className = `alert alert-${type}`; // alert-success, alert-warning, alert-danger
    signupMessage.classList.remove("d-none");

    // hide after 3 seconds
    setTimeout(() => {
        signupMessage.classList.add("d-none");
    }, 3000);
}
const signupForm = document.querySelector("#signup-form");
let isSubmitting = false;

signupForm.addEventListener("submit", async (e) => {
    e.preventDefault();

    if (isSubmitting) return;
    isSubmitting = true;

    const name = document.querySelector("#name").value.trim();
    const phone = document.querySelector("#phone").value.trim();
    const email = document.querySelector("#email").value.trim();
    const password = document.querySelector("#password").value;
    const pincode = document.querySelector("[name='pincode']").value.trim();

    const nameError = document.querySelector("#nameError");
    const phoneError = document.querySelector("#phoneError");
    const emailError = document.querySelector("#emailError");
    const passwordError = document.querySelector("#passwordError");

    // Clear all errors
    nameError.textContent = "";
    phoneError.textContent = "";
    emailError.textContent = "";
    passwordError.textContent = "";

    // ================= NAME =================
    if (!/^[A-Za-z ]+$/.test(name)) {
        nameError.innerHTML = "Only alphabets allowed (A–Z, a–z)";
        isSubmitting = false;
        return;
    }

    const words = name.split(/\s+/);

    for (let word of words) {
        if (word.length < 2) {
            nameError.innerHTML = "Each name must have at least 2 characters";
            isSubmitting = false;
            return;
        }
    }

    if (words.length === 1) {
        if (name[0] !== name[0].toUpperCase()) {
            nameError.innerHTML = "Name must start with a capital letter";
            isSubmitting = false;
            return;
        }
    } else {
        for (let word of words) {
            if (word[0] !== word[0].toUpperCase()) {
                nameError.innerHTML = "Each word must start with a capital letter";
                isSubmitting = false;
                return;
            }
        }
    }

    // ================= PHONE =================
    if (!/^\d+$/.test(phone)) {
        phoneError.innerHTML = "Phone number must contain only digits";
        isSubmitting = false;
        return;
    }

    if (phone.length !== 10) {
        phoneError.innerHTML = "Phone number must be exactly 10 digits";
        isSubmitting = false;
        return;
    }

    if (!/^[6-9]/.test(phone)) {
        phoneError.innerHTML = "Phone number must start with 6, 7, 8, or 9";
        isSubmitting = false;
        return;
    }

    // ================= EMAIL =================
    if (!email.includes("@")) {
        emailError.innerHTML = "Email must contain @ symbol";
        isSubmitting = false;
        return;
    }

    const parts = email.split("@");

    if (parts[0].length === 0) {
        emailError.innerHTML = "Email username cannot be empty";
        isSubmitting = false;
        return;
    }

    if (!parts[1] || !parts[1].includes(".")) {
        emailError.innerHTML = "Email must contain a valid domain (e.g., gmail.com)";
        isSubmitting = false;
        return;
    }

    const domainParts = parts[1].split(".");

    if (domainParts[0].length < 2) {
        emailError.innerHTML = "Domain must be at least 2 characters";
        isSubmitting = false;
        return;
    }

    if (domainParts[1].length < 2) {
        emailError.innerHTML = "TLD must be at least 2 letters (e.g., .com)";
        isSubmitting = false;
        return;
    }

    // ================= PASSWORD =================
    if (password.length < 6) {
        passwordError.innerHTML = "Password must be at least 6 characters";
        isSubmitting = false;
        return;
    }

    if (!/[A-Za-z]/.test(password)) {
        passwordError.innerHTML = "Password must contain at least one letter";
        isSubmitting = false;
        return;
    }

    if (!/\d/.test(password)) {
        passwordError.innerHTML = "Password must contain at least one number";
        isSubmitting = false;
        return;
    }

    // ================= PINCODE =================
    if (pincode) {
        if (!/^\d+$/.test(pincode)) {
            showMessage("Pincode must contain only numbers");
            isSubmitting = false;
            return;
        }

        if (pincode.length !== 6) {
            showMessage("Pincode must be exactly 6 digits");
            isSubmitting = false;
            return;
        }

        if (pincode.startsWith("0")) {
            showMessage("Pincode cannot start with 0");
            isSubmitting = false;
            return;
        }
    }

    try {
        console.log("FRONTEND EMAIL:", email);

        const res = await fetch("http://51.20.253.239:5000/api/auth/register", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                name,
                email,
                password,
                phone
            })
        });

        const data = await res.json();

        if (res.ok) {
            window.location.href = `otp-verification.html?email=${email}`;
        } else {
            showMessage(data.message || "Registration failed");
        }
    } catch (error) {
        console.error("REGISTER ERROR:", error);
        showMessage("Something went wrong");
    } finally {
        isSubmitting = false;
    }
});
</script>


</body>

</html>
