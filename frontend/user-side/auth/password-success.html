<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Success - Scentora</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Aclonica&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="../assets/css/style.css">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        .success-icon {
            font-size: 80px;
            color: #28a745;
            margin-bottom: 20px;
        }
        @media (max-width: 991px) {
    .login-container {
        display: flex !important;
        flex-direction: column !important;
        width: 94% !important;
        max-width: 720px !important;
        min-height: auto !important;
        height: auto !important;
        margin: 20px auto !important;
        border-radius: 18px !important;
        overflow: hidden !important;
    }

    .left-content,
    .right {
        width: 100% !important;
        max-width: 100% !important;
        flex: 0 0 100% !important;
        position: static !important;
        left: auto !important;
        right: auto !important;
        top: auto !important;
        transform: none !important;
        margin: 0 !important;
        display: block !important;
    }

    .left-content {
        padding: 28px 22px 18px !important;
    }

    .right {
        padding: 24px 22px 28px !important;
        background: #f4f7fb !important;
    }

    .features {
        display: grid !important;
        grid-template-columns: repeat(3, 1fr) !important;
        gap: 12px !important;
    }

    .brand-container {
        text-align: center;
    }

    .brand {
        font-size: 42px !important;
        text-align: center;
    }

    .tagline {
        text-align: center;
        font-size: 16px;
        margin-bottom: 20px;
    }

    .right h2 {
        text-align: center;
        font-size: 30px !important;
        margin-bottom: 18px;
    }
}

@media (max-width: 767px) {
    .login-container {
        width: 100% !important;
        min-height: 100vh !important;
        margin: 0 !important;
        border-radius: 0 !important;
        box-shadow: none !important;
    }

    .left-content {
        padding: 24px 18px 16px !important;
    }

    .right {
        padding: 22px 18px 24px !important;
    }

    .brand {
        font-size: 30px !important;
    }

    .tagline {
        font-size: 15px !important;
        margin-bottom: 18px !important;
    }

    .features {
        grid-template-columns: 1fr !important;
        gap: 12px !important;
    }

    .feature-card {
        padding: 14px !important;
        min-height: auto !important;
    }

    .right h2 {
        font-size: 28px !important;
    }

    .login-btn {
        width: 100% !important;
    }

    .close-btn {
        top: 10px !important;
        right: 14px !important;
        font-size: 24px !important;
        z-index: 10 !important;
    }

    .success-icon {
        font-size: 64px !important;
        margin-bottom: 16px !important;
    }

    .right p {
        font-size: 14px !important;
    }
}

@media (max-width: 480px) {
    .login-container {
        width: 100% !important;
        min-height: 100vh !important;
        height: auto !important;
    }

    .left-content {
        padding: 18px 14px 10px !important;
    }

    .right {
        padding: 18px 14px 24px !important;
        opacity: 1 !important;
        visibility: visible !important;
    }

    .brand {
        font-size: 24px !important;
    }

    .tagline {
        font-size: 13px !important;
    }

    .features {
        display: none !important;
    }

    .right h2 {
        font-size: 22px !important;
    }

    .success-icon {
        font-size: 52px !important;
    }

    .right p {
        font-size: 13px !important;
    }

    .login-btn,
    button {
        font-size: 14px !important;
    }
}
    </style>
</head>

<body>
    <div class="login-container">
        <div class="close-btn" onclick="window.location.href='login.html'">&times;</div>

        <div class="left-content">
            <div class="brand-container">
                <div class="brand">SCENTORA</div>
                <div class="tagline">Login now to avail best offer !</div>
            </div>

            <div class="features">
                <div class="feature-card">
                    <span>✨</span>
                    <h4>Customer First</h4>
                    <p>Putting you in the center</p>
                </div>

                <div class="feature-card">
                    <span>✨</span>
                    <h4>Transparent</h4>
                    <p>Honest from inside out</p>
                </div>

                <div class="feature-card">
                    <span>✨</span>
                    <h4>Innovative</h4>
                    <p>Getting the absolute best for you</p>
                </div>
            </div>
        </div>

        <div class="right">
            <div class="text-center">
                <div class="success-icon">
                    <i class="bi bi-check-circle-fill"></i>
                </div>
                <h2>Success!</h2>
                <p class="mt-2 mb-4" style="color: #666; font-size: 16px;">Password updated successfully</p>

                <button class="login-btn mt-4" onclick="window.location.href='/user-side/auth/login.html'">
Go to Login
</button>
            </div>
        </div>
    </div>
    <!-- Bootstrap 5 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
