<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - Scentora</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Aclonica&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="../assets/css/style.css">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
</head>

<body>
    <div class="login-container">
        <div class="close-btn" onclick="window.location.href='login.html'">&times;</div>

        <div class="left-content">
            <div class="brand-container">
                <div class="brand">SCENTORA</div>
                <div class="tagline">Login now to avail best offer !</div>
            </div>

            <div class="features">
                <div class="feature-card">
                    <span>✨</span>
                    <h4>Customer First</h4>
                    <p>Putting you in the center</p>
                </div>

                <div class="feature-card">
                    <span>✨</span>
                    <h4>Transparent</h4>
                    <p>Honest from inside out</p>
                </div>

                <div class="feature-card">
                    <span>✨</span>
                    <h4>Innovative</h4>
                    <p>Getting the absolute best for you</p>
                </div>
            </div>
        </div>

        <div class="right">
            <h2>Reset Password</h2>
            <div id="uiMessage" class="alert alert-warning d-none text-center" role="alert"></div>
            <p class="text-center mt-2 mb-4" style="color: #666; font-size: 14px;">Please enter your new password below
            </p>
            <label>Enter OTP</label>
<input type="text" id="otp" placeholder="Enter OTP" />

            <label>New Password</label>
            <div class="password-wrapper">
                <input type="password" id="new-password" placeholder="New Password" />
            </div>

            <label>Confirm Password</label>
            <div class="password-wrapper">
                <input type="password" id="confirm-password" placeholder="Confirm Password" />
            </div>

            <button class="login-btn mt-4" onclick="resetPassword()">Update Password</button>

        </div>
    </div>
    <!-- Bootstrap 5 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
const uiMessage = document.getElementById("uiMessage");

function showMessage(msg, type = "danger") {
    uiMessage.textContent = msg;
    uiMessage.classList.remove("d-none","alert-success","alert-danger","alert-warning");
    uiMessage.classList.add(`alert-${type}`);
}

async function resetPassword() {

    const email = localStorage.getItem("resetEmail");
    const otp = document.getElementById("otp").value.trim();
    const newPassword = document.getElementById("new-password").value.trim();
    const confirmPassword = document.getElementById("confirm-password").value.trim();

    if (!otp || !newPassword || !confirmPassword) {
        showMessage("Please fill all fields");
        return;
    }

    if (newPassword !== confirmPassword) {
        showMessage("Passwords do not match");
        return;
    }

    try {

        const res = await fetch("http://localhost:5000/api/auth/reset-password", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ email, otp, newPassword })
        });

        const data = await res.json();

        if (res.ok) {

            showMessage("Password updated successfully!", "success");

            setTimeout(() => {
                localStorage.removeItem("resetEmail");
                window.location.href = "password-success.html";
            }, 1500);

        } else {
            showMessage(data.message || "Password reset failed");
        }

    } catch {
        showMessage("Server error. Try again later.");
    }
}
</script>

</body>

</html>
