<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OTP Verification - Scentora</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Aclonica&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="../assets/css/style.css">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
</head>

<body>
    <div class="otp-container">
        <!-- Close Button -->
        <div class="close-btn" style="color: #fff">&times;</div>
        <h2 class="page-title" style="color: #fff">OTP Verification</h2>
        <p class="otp-instruction" style="color: #fff">
            Verification code sent to your email.
        </p>
        <div id="uiMessage" class="alert alert-warning d-none text-center" role="alert"></div>

        <form id="otp-form">
            <div class="otp-inputs" id="otp">
                <input type="text" maxlength="1" class="otp-field">
                <input type="text" maxlength="1" class="otp-field">
                <input type="text" maxlength="1" class="otp-field">
                <input type="text" maxlength="1" class="otp-field">
            </div>

            <div class="resend-otp">
Didn't receive code? <a href="#" onclick="resendOTP()">Resend OTP</a>
            </div>

            <button type="button" onclick="verifyOTP()">Verify OTP</button>


        </form>
    </div>

    <!-- Bootstrap 5 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
const params = new URLSearchParams(window.location.search);
const email = params.get("email");
const uiMessage = document.getElementById("uiMessage");

function showMessage(msg, type = "danger") {
  uiMessage.textContent = msg;
  uiMessage.classList.remove("d-none","alert-success","alert-danger","alert-warning");
  uiMessage.classList.add(`alert-${type}`);
}

async function verifyOTP() {

  const inputs = document.querySelectorAll(".otp-field");
  let otp = "";

  inputs.forEach(input => {
    otp += input.value;
  });

  if (otp.length !== 4) {
    showMessage("Please enter the complete OTP");
    return;
  }

  try {

    const response = await fetch("http://localhost:5000/api/auth/verify-otp", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ email, otp })
    });

    const data = await response.json();

    if (response.ok) {
      showMessage("Account verified successfully!", "success");

      setTimeout(() => {
        window.location.href = "login.html";
      }, 1500);

    } else {
      showMessage(data.message || "Invalid OTP");
    }

  } catch {
    showMessage("Server error. Try again later.");
  }
}

async function resendOTP() {

  try {

    const response = await fetch("http://localhost:5000/api/auth/resend-otp", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ email })
    });

    const data = await response.json();

    if (response.ok) {
      showMessage("New OTP sent to your email!", "success");
    } else {
      showMessage(data.message);
    }

  } catch {
    showMessage("Server error. Try again.");
  }
}
</script>

</body>

</html>
