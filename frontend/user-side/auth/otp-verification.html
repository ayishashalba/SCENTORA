<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OTP Verification - Scentora</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Aclonica&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="../assets/css/style.css">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
      @media (max-width: 991px) {
    .otp-container {
        width: 92% !important;
        max-width: 520px !important;
        margin: 30px auto !important;
        padding: 30px 24px !important;
        border-radius: 18px !important;
        min-height: auto !important;
        height: auto !important;
    }

    .page-title {
        font-size: 32px !important;
        text-align: center;
    }

    .otp-instruction {
        font-size: 15px !important;
        text-align: center;
        margin-bottom: 20px !important;
    }

    .otp-inputs {
        gap: 12px !important;
        justify-content: center !important;
    }

    .otp-field {
        width: 56px !important;
        height: 56px !important;
        font-size: 24px !important;
        text-align: center;
    }
}

@media (max-width: 767px) {
    .otp-container {
        width: 94% !important;
        max-width: 420px !important;
        margin: 20px auto !important;
        padding: 26px 18px !important;
        border-radius: 14px !important;
    }

    .page-title {
        font-size: 28px !important;
    }

    .otp-instruction {
        font-size: 14px !important;
        margin-bottom: 18px !important;
    }

    .otp-inputs {
        gap: 10px !important;
    }

    .otp-field {
        width: 50px !important;
        height: 50px !important;
        font-size: 22px !important;
    }

    .resend-otp {
        text-align: center;
        font-size: 14px !important;
        margin-top: 16px !important;
    }

    .otp-container button {
        width: 100% !important;
        font-size: 15px !important;
        padding: 12px 14px !important;
        margin-top: 18px !important;
    }

    .close-btn {
        top: 10px !important;
        right: 14px !important;
        font-size: 24px !important;
    }

    #uiMessage {
        font-size: 14px !important;
    }
}

@media (max-width: 480px) {
    .otp-container {
        width: 100% !important;
        min-height: 100vh !important;
        margin: 0 !important;
        border-radius: 0 !important;
        padding: 24px 14px !important;
        display: flex;
        flex-direction: column;
        justify-content: center;
    }

    .page-title {
        font-size: 24px !important;
    }

    .otp-instruction {
        font-size: 13px !important;
    }

    .otp-inputs {
        gap: 8px !important;
    }

    .otp-field {
        width: 44px !important;
        height: 44px !important;
        font-size: 20px !important;
    }

    .resend-otp {
        font-size: 13px !important;
    }

    .otp-container button {
        font-size: 14px !important;
    }
}
    </style>
</head>

<body>
    <div class="otp-container">
        <!-- Close Button -->
        <div class="close-btn" style="color: #fff">&times;</div>
        <h2 class="page-title" style="color: #fff">OTP Verification</h2>
        <p class="otp-instruction" style="color: #fff">
            Verification code sent to your email.
        </p>
        <div id="uiMessage" class="alert alert-warning d-none text-center" role="alert"></div>

        <form id="otp-form">
            <div class="otp-inputs" id="otp">
                <input type="text" maxlength="1" class="otp-field">
                <input type="text" maxlength="1" class="otp-field">
                <input type="text" maxlength="1" class="otp-field">
                <input type="text" maxlength="1" class="otp-field">
            </div>

            <div class="resend-otp">
Didn't receive code? <a href="#" onclick="resendOTP()">Resend OTP</a>
            </div>

            <button type="button" onclick="verifyOTP()">Verify OTP</button>


        </form>
    </div>

    <!-- Bootstrap 5 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
const params = new URLSearchParams(window.location.search);
const email = params.get("email");
const uiMessage = document.getElementById("uiMessage");

function showMessage(msg, type = "danger") {
  uiMessage.textContent = msg;
  uiMessage.classList.remove("d-none","alert-success","alert-danger","alert-warning");
  uiMessage.classList.add(`alert-${type}`);
}

async function verifyOTP() {

  const inputs = document.querySelectorAll(".otp-field");
  let otp = "";

  inputs.forEach(input => {
    otp += input.value;
  });

  if (otp.length !== 4) {
    showMessage("Please enter the complete OTP");
    return;
  }

  try {

    const response = await fetch("http://51.20.253.239:5000/api/auth/verify-otp", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ email, otp })
    });

    const data = await response.json();

    if (response.ok) {
      showMessage("Account verified successfully!", "success");

      setTimeout(() => {
        window.location.href = "login.html";
      }, 1500);

    } else {
      showMessage(data.message || "Invalid OTP");
    }

  } catch {
    showMessage("Server error. Try again later.");
  }
}

async function resendOTP() {

  try {

    const response = await fetch("http://51.20.253.239:5000/api/auth/resend-otp", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ email })
    });

    const data = await response.json();

    if (response.ok) {
      showMessage("New OTP sent to your email!", "success");
    } else {
      showMessage(data.message);
    }

  } catch {
    showMessage("Server error. Try again.");
  }
}
</script>

</body>

</html>
