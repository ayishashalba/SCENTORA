<head>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Aclonica&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>

    }

        grid-template-columns: repeat(3, 1fr);

}

@media (min-width: 768px) and (max-width: 991px) {

@media (max-width: 767px) {

        width: 100%;
        min-height: 100vh;
        margin: 0;
        border-radius: 0;
        box-shadow: none;
        display: flex;
        flex-direction: column;
    }

    .left-content {
        width: 100%;

    }

        width: 100%;
        padding: 22px 18px 24px;
        display: block !important;
    }

    }

    .brand {

    }

        font-size: 15px;
        text-align: center;

    }

        display: grid;
        grid-template-columns: 1fr;
        gap: 12px;
    }

        padding: 14px;

    }

        text-align: center;

        z-index: 10;
    }

    }
}

@media (max-width: 480px) {
    .login-container {
        width: 100%;
        min-height: 100vh;
        height: auto !important;
    }

    .left-content {
        padding: 18px 14px 10px;
    }

    .right {
        padding: 18px 14px 24px;
        opacity: 1 !important;
        visibility: visible !important;
    }

    .brand {
        font-size: 24px;
    }

    .tagline {
        font-size: 13px;
    }

    .features {
        display: none;
    }

    }

        font-size: 16px;
    }

    .feature-card p,
    .links a,
    label,

    input,

    </style>
</head>

<body>
    <div class="login-container">
        <div class="close-btn" onclick="window.location.href='login.html'">&times;</div>

        <div class="left-content">
            <div class="brand-container">
                <div class="brand">SCENTORA</div>
                <div class="tagline">Login now to avail best offer !</div>
            </div>

            <div class="features">
                <div class="feature-card">
                    <span>✨</span>
                    <h4>Customer First</h4>
                    <p>Putting you in the center</p>
                </div>

                <div class="feature-card">
                    <span>✨</span>
                    <h4>Transparent</h4>
                    <p>Honest from inside out</p>
                </div>

                <div class="feature-card">
                    <span>✨</span>
                    <h4>Innovative</h4>
                    <p>Getting the absolute best for you</p>
                </div>
            </div>
        </div>

        <div class="right">
            <h2>Forgot Password</h2>
            <div id="uiMessage" class="alert alert-warning d-none" role="alert"></div>
            <p class="text-center mt-2 mb-4" style="color: #666; font-size: 14px;">Enter your registered email to
                confirm</p>

            <label>Email Address</label>
            <input type="email" placeholder="Enter your email" />

            <div class="links mt-3 text-start">
                <a href="login.html"><i class="bi bi-arrow-left me-1"></i> Back to Login</a>
            </div>

            <button class="login-btn mt-4"><a href="reset-password.html" style="text-decoration: none;color:#fff">Change
                    Password</a></button>


        </div>
    </div>
    <!-- Bootstrap 5 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
   <script>
const uiMessage = document.getElementById("uiMessage");

document.querySelector('.login-btn').addEventListener('click', async (e) => {
    e.preventDefault();

    const email = document.querySelector('input[type="email"]').value.trim();

    if (!email) {
        showMessage("Please enter your email", "danger");
        return;
    }

    try {
        const res = await fetch("http://51.20.253.239:5000/api/auth/forgot-password", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ email })
        });

        const data = await res.json();

        if (res.ok) {
            localStorage.setItem("resetEmail", email);
            showMessage("OTP sent to your email!", "success");

            setTimeout(() => {
                window.location.href = "reset-password.html";
            }, 1500);
        } else {
            showMessage(data.message || "Something went wrong", "danger");
        }

    } catch {
        showMessage("Server error. Try again.", "danger");
    }
});

function showMessage(msg, type) {
    uiMessage.textContent = msg;
    uiMessage.classList.remove("d-none", "alert-success", "alert-danger", "alert-warning");
    uiMessage.classList.add(`alert-${type}`);
}
</script>


</body>

</html>
