<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - Scentora</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Aclonica&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="../assets/css/style.css">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
</head>

<body>
    <div class="login-container">
        <div class="close-btn" onclick="window.location.href='login.html'">&times;</div>

        <div class="left-content">
            <div class="brand-container">
                <div class="brand">SCENTORA</div>
                <div class="tagline">Login now to avail best offer !</div>
            </div>

            <div class="features">
                <div class="feature-card">
                    <span>✨</span>
                    <h4>Customer First</h4>
                    <p>Putting you in the center</p>
                </div>

                <div class="feature-card">
                    <span>✨</span>
                    <h4>Transparent</h4>
                    <p>Honest from inside out</p>
                </div>

                <div class="feature-card">
                    <span>✨</span>
                    <h4>Innovative</h4>
                    <p>Getting the absolute best for you</p>
                </div>
            </div>
        </div>

        <div class="right">
            <h2>Forgot Password</h2>
            <div id="uiMessage" class="alert alert-warning d-none" role="alert"></div>
            <p class="text-center mt-2 mb-4" style="color: #666; font-size: 14px;">Enter your registered email to
                confirm</p>

            <label>Email Address</label>
            <input type="email" placeholder="Enter your email" />

            <div class="links mt-3 text-start">
                <a href="login.html"><i class="bi bi-arrow-left me-1"></i> Back to Login</a>
            </div>

            <button class="login-btn mt-4"><a href="reset-password.html" style="text-decoration: none;color:#fff">Change
                    Password</a></button>


        </div>
    </div>
    <!-- Bootstrap 5 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
   <script>
const uiMessage = document.getElementById("uiMessage");

document.querySelector('.login-btn').addEventListener('click', async (e) => {
    e.preventDefault();

    const email = document.querySelector('input[type="email"]').value.trim();

    if (!email) {
        showMessage("Please enter your email", "danger");
        return;
    }

    try {
        const res = await fetch("http://localhost:5000/api/auth/forgot-password", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ email })
        });

        const data = await res.json();

        if (res.ok) {
            localStorage.setItem("resetEmail", email);
            showMessage("OTP sent to your email!", "success");

            setTimeout(() => {
                window.location.href = "reset-password.html";
            }, 1500);
        } else {
            showMessage(data.message || "Something went wrong", "danger");
        }

    } catch {
        showMessage("Server error. Try again.", "danger");
    }
});

function showMessage(msg, type) {
    uiMessage.textContent = msg;
    uiMessage.classList.remove("d-none", "alert-success", "alert-danger", "alert-warning");
    uiMessage.classList.add(`alert-${type}`);
}
</script>


</body>

</html>
