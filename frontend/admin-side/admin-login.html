<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Scentora</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Aclonica&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=abhaya+libre:wght@300;400;500;600&display=swap"
        rel="stylesheet">
    <!-- Custom CSS -->
    <style>
        body {
            font-family: 'abhaya libre medium';
            background-color: #D3DBEA;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
        }

        .login-card {
            width: 100%;
            max-width: 400px;
            padding: 2.5rem;
            border: none;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            background-color: #2e415f;
        }

        .brand-logo {
            text-align: center;
            font-family: 'aclonica', sans-serif;
            font-size: 32px;
            color: #fff;
            text-decoration: none;
        }

        .admin-title {
            font-weight: 500;
            color: #fff;
            margin-bottom: 1.5rem;
            text-align: center;
        }

        .form-label {
            font-weight: 500;
            font-size: 0.9rem;
            color: #fff;
        }

        .form-control {
            border-radius: 8px;
            padding: 0.75rem 1rem;
            border: none;
            margin-bottom: 1.25rem;
        }

        .login-btn {
            width: 100%;
            padding: 0.75rem;
            border-radius: 8px;
            font-weight: 600;
            letter-spacing: 0.5px;
            margin-top: 0.5rem;
            background-color: #1E50A0;
            color: #fff;
        }

        .footer-text {
            text-align: center;
            margin-top: 2rem;
            font-size: 0.85rem;
            color: #adb5bd;
        }
    </style>
</head>

<body>

    <div class="login-card">
        <div class="col-12">
            <p class="brand-logo">SCENTORA</p>
        </div>
        <h3 class="admin-title">Admin Login</h3>

        <form id="adminLoginForm">
            <div id="messageBox"></div>
            <div class="mb-3">
                <label for="email" class="form-label">Email Address</label>
                <input type="email" class="form-control" id="email" placeholder="admin@scentora.com" required>
            </div>

            <div class="mb-3">
                <label for="password" class="form-label">Password</label>
                <input type="password" class="form-control" id="password" placeholder="Enter your password" required>
            </div>

            <button type="submit" class="btn btn-primary login-btn">Login</button>
            <div class="text-end mb-3">
    <a href="#" id="forgotPasswordLink" style="font-size: 0.85rem; color: #adb5bd; text-decoration: none;">
        Forgot Password?
    </a>
</div>
        </form>


        <div class="footer-text">
            © Admin Dashboard
        </div>
    </div>
<!-- Forgot Password Modal -->
<div class="modal fade" id="forgotPasswordModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content p-3">
      
      <div class="modal-header">
        <h5 class="modal-title">Reset Password</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body">
        <input type="email" id="resetEmail" class="form-control mb-3" placeholder="Enter your email">

        <button class="btn btn-primary w-100" id="sendResetBtn">
          Send Reset Link
        </button>
      </div>

    </div>
  </div>
</div>
    <!-- Bootstrap 5 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function showMessage(message, type = "success") {
    const box = document.getElementById("messageBox");

    box.innerHTML = `
        <div class="alert alert-${type} alert-dismissible fade show mt-3" role="alert">
            ${message}
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
    `;

    setTimeout(() => {
        box.innerHTML = "";
    }, 4000);
}
        document.getElementById('adminLoginForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value.trim();

            try {
                const res = await fetch('http://localhost:5000/api/admin/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await res.json();

                if (res.ok) {
                    localStorage.setItem('adminToken', data.token);
                    localStorage.setItem('adminName', data.name);

                    window.location.href = 'admin-dashboard.html';
                } else {
                    showMessage(data.message || 'Login failed');
                }

            } catch (err) {
                showMessage('Server error. Try again later.');
            }
        });
        // Open modal
document.getElementById("forgotPasswordLink").addEventListener("click", () => {
    const modal = new bootstrap.Modal(document.getElementById("forgotPasswordModal"));
    modal.show();
});

// Send reset request
document.getElementById("sendResetBtn").addEventListener("click", async () => {
    const email = document.getElementById("resetEmail").value.trim();

    if (!email) return showMessage("Please enter email", "danger");

    try {
        const res = await fetch("http://localhost:5000/api/admin/forgot-password", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ email })
        });

        const data = await res.json();

        if (res.ok) {
            showMessage("Reset link sent to email");

            // ✅ Close modal
            const modalEl = document.getElementById("forgotPasswordModal");
            const modal = bootstrap.Modal.getInstance(modalEl);
            modal.hide();

            // ✅ Clear input
            document.getElementById("resetEmail").value = "";

        } else {
            showMessage(data.message || "Failed", "danger");
        }

    } catch (err) {
        showMessage("Server error", "danger");
    }
});
    </script>

</body>

</html>
